<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Image Reference</title>
<style>
  body { background: #111; color: #eee; font-family: sans-serif; padding: 20px; }
  h1 { text-align: center; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .card { background: #222; border-radius: 8px; overflow: hidden; text-align: center; }
  .card img { width: 100%; height: 160px; object-fit: contain; background: #131313; padding: 8px; box-sizing: border-box; }
  .card p { margin: 0; padding: 8px; font-weight: bold; font-size: 14px; color: #f90; }
</style>
</head>
<body>
<h1>All Uploaded Images (p1–p18)</h1>
