    <g transform="rotate(300,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
    <g transform="rotate(320,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
    <g transform="rotate(340,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
