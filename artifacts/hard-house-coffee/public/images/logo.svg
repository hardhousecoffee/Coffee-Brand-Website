<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <!-- OUTER RINGS - deep brick red -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#8B2020" stroke-width="3.5"/>
  <circle cx="200" cy="200" r="166" fill="none" stroke="#8B2020" stroke-width="2"/>

