  <g fill="#E8D8B5">
    <g transform="rotate(0,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
    <g transform="rotate(20,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
    <g transform="rotate(40,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
    <g transform="rotate(60,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
    <g transform="rotate(80,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
    <g transform="rotate(100,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
    <g transform="rotate(120,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
    <g transform="rotate(140,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
    <g transform="rotate(160,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
    <g transform="rotate(180,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
    <g transform="rotate(200,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
    <g transform="rotate(220,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
    <g transform="rotate(240,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
    <g transform="rotate(260,200,200) translate(178,0) rotate(90)"><ellipse cx="0" cy="0" rx="10" ry="6"/><line x1="0" y1="-10" x2="0" y2="10" stroke="#5C2A0A" stroke-width="0.9"/></g>
